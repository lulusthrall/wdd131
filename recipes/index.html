<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recipe Book</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <meta property="og:type" content="website">
    <meta property="og:title" content="Recipe Book">
    <meta property="og:description" content="A collection of delicious recipes.">
    <meta property="og:url" content="your-url-here">
    <meta property="og:image" content="images/social-preview-image.png">
    <link rel="icon" href="favicon.ico">
    <link rel="apple-touch-icon" href="images/apple-touch-icon.png">
    <script src="main.js" defer></script>
</head>
<body>
    <header>
        <div class="logo-area">
            <img src="images/recipe-book.png" alt="Recipe Book Logo" class="logo">
            <h1>RECIPEBOOK</h1>
        </div>
    </header>

    <main>
        <div class="search-container">
            <input type="text" id="search-input" placeholder="Find a recipe">
            <button id="search-btn" class="search-icon-wrapper">
                <img src="images/search.svg" alt="Search">
            </button>
        </div>

        <div id="recipe-container">
            </div>
    </main>

    <footer>
        <div class="footer-top">
            <a href="https://www.flaticon.com/free-icons/recipe" class="attribution">Recipe icons created by Freepik - Flaticon</a>
            <div class="social">
                <a href="#"><img src="images/instagram_icon.svg" alt="instagram icon"></a>
                <a href="#"><img src="images/youtube_icon.svg" alt="youtube icon"></a>
                <a href="#"><img src="images/pinterest_icon.svg" alt="pinterest icon"></a>
            </div>
        </div>
    </footer>
</body>
</html>
