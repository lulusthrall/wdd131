<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Card - Snortleblat</title>

    <meta property="og:type" content="website">
    <meta property="og:title" content="Snortleblat Character Card">
    <meta property="og:description" content="View the stats for Snortleblat, the Swamp Beast Diplomat.">
    <meta property="og:url" content="https://yourURLofPage.here">
    <meta property="og:image" content="https://raw.githubusercontent.com/byui-cse/cse121b-course/master/images/snortleblat.jpg">

    <link rel="icon" href="/favicon.ico">
    <link rel="apple-touch-icon" href="/images/apple-touch-icon.png">

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <img id="charImage" class="image" src="" alt="Character Image">
        <div class="name" id="charName"></div>
        <div class="stats">
            <p><strong>Class:</strong> <span id="charClass"></span></p>
            <p><strong>Level:</strong> <span id="charLevel"></span></p>
            <p><strong>Health:</strong> <span id="charHealth"></span></p>
        </div>
        <div class="buttons">
            <button id="attackBtn">Attacked</button>
            <button id="levelBtn">Level Up</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
