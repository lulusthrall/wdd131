<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credit Card Project</title>
    <link rel="icon" href="favicon.ico" type="images/credit.jpg">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main>
        <h1>Payment Information</h1>

        <form id="checkoutForm">
            <div class="card-wrapper">
                
                <div class="card-container front">
                    <div class="card-total">TOTAL: $199</div>
                    <div class="card-logo">💳</div>

                    <div class="field-group" id="cardNumber-group">
                        <label for="cardNumber">CARD NUMBER</label>
                        <input type="text" id="cardNumber" name="cardNumber" placeholder="1234123412341234" required>
                    </div>

                    <div class="field-group" id="cardName-group">
                        <label for="cardName">CARD HOLDER</label>
                        <input type="text" id="cardName" name="cardName" placeholder="John Doe" required>
                    </div>

                    <div class="field-group" id="cardExpiration">
                        <label id="expirationDate">EXPIRATION</label>
                        <div class="exp-inputs">
                            <input type='text' id='month' name="expMonth" placeholder="MM" aria-labelledby="expirationDate" required>
                            <input type='text' id='year' name="expYear" placeholder="YY" aria-labelledby="expirationDate" required>
                        </div>
                    </div>
                    
                    <div id="errorMessages" class="errors"></div>
                </div>

                <div class="card-container back">
                    <div class="black-stripe"></div>
                    <div class="field-group cvv-group">
                        <label for="cvv">CVC/CVV</label>
                        <input type="text" id="cvv" name="cvv" placeholder="xxx" required>
                    </div>
                </div>

            </div> <div class="button-container">
                <button type="submit" id="submitButton">Submit</button>
            </div>
        </form>
    </main>

    <script src="script.js"></script>
</body>
</html>
